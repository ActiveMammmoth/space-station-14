- type: entity
  id: ActionPetrifySpell
  name: Flesh to Stone
  description: Poke someone with this magic to find out how statues are made!
  components:
  - type: EntityTargetAction
    useDelay: 60
    itemIconStyle: BigAction
    whitelist:
      components:
      - Body
    blacklist:
      components:
      - Petrify
    canTargetSelf: false
    interactOnMiss: false
    sound: !type:SoundPathSpecifier
      path: /Audio/Effects/break_stone.ogg
    icon:
      sprite: Objects/Magic/magicactions.rsi
      state: flesh_to_stone
    event: !type:ChangeComponentsSpellEvent
      toAdd:
      - type: Animateable
      - type: Petrify
      - type: Stasis
      - type: Damageable
        damageContainer: ManifestedSpirit
        damageModifierSet: ManifestedSpirit
      - type: Destructible
        thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 400
          behaviors:
          - !type:DoActsBehavior
            acts: ["Destruction"]
          - !type:PlaySoundBehavior
            sound: !type:SoundPathSpecifier
              path: /Audio/Effects/break_stone.ogg
      toRemove:
      - Damageable
      - Destructible
      - MobCollision
      speech: action-speech-spell-petrify
      doSpeech: true
